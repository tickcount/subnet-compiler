name: Collect & Compile Rule Sets

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  SING_BOX_VERSION: "1.13.12"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache sing-box
        id: cache-singbox
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/sing-box
          key: sing-box-${{ env.SING_BOX_VERSION }}

      - name: Install sing-box
        if: steps.cache-singbox.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ env.SING_BOX_VERSION }}"
          curl -fsSL \
            "https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz" \
            | sudo tar xz --strip-components=1 -C /usr/local/bin/ \
                "sing-box-${VERSION}-linux-amd64/sing-box"

      - name: Compile rule sets
        run: python compiler.py --out rules/

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: update rule sets $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
